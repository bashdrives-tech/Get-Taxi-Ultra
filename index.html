    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #0b1329; /* Deep dark blue */
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        visibility: visible;
        transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
      }
      #splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .splash-text {
        font-size: 2.75rem;
        font-weight: 900;
        color: #facc15; /* Beautiful brand yellow */
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        letter-spacing: -0.025em;
        text-shadow: 0 4px 24px rgba(250, 204, 21, 0.25);
        animation: subtle-zoom 3.5s ease-out forwards;
      }
      @keyframes subtle-zoom {
        0% {
          transform: scale(0.92);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        100% {
          transform: scale(1.1);
          opacity: 1;
        }
      }
    </style>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(() => {
              splash.remove();
            }, 1000);
          }
        }, 2500);
      });
